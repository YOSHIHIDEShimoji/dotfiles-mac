# ==========================================
# 基本設定
# ==========================================
# シェルをzshにする
set-option -g default-shell /bin/zsh

# ウィンドウ番号を1から開始（左端のキーに合わせる）
set-option -g base-index 1

# マウス操作を有効化（クリックでペイン選択、スクロールでログ確認）
set -g mouse on

# カラー設定（24bit color / True Color対応）
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# ステータスバーをトップに配置
set-option -g status-position top

# ==========================================
# キーバインド設定
# ==========================================
# 1. Prefix（合図）を Ctrl + s に変更
set -g prefix C-s
unbind C-b  # デフォルトの Ctrl + b を解除

# 2. 設定のリロード (Prefix + r)
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# 3. 画面分割 (h: 縦に割る / n: 横に割る)
bind h split-window -h
bind n split-window -v

# 4. ペイン移動 (i, j, k, l を十字キーに見立てる)
bind i select-pane -U  # 上
bind j select-pane -L  # 左
bind k select-pane -D  # 下
bind l select-pane -R  # 右

# ==========================================
# Catppuccin テーマ設定 (見た目のカスタマイズ)
# ==========================================
# ※プラグインが ~/.config/tmux/plugins/ に配置されている前提
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# テーマ本体の読み込み
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# ステータスバー表示項目の設定
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"