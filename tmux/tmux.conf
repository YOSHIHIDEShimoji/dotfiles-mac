# ==========================================
# 基本設定
# ==========================================
# default-shell はハードコードしない（Linux では zsh が /usr/bin/zsh のこともある＝#29）。
# chsh 済み運用なら tmux はログインシェルを使うため、この設定自体が不要。

# ウィンドウ番号を1から開始
set-option -g base-index 1

# ペイン番号を1から開始
setw -g pane-base-index 1

# マウス操作を有効化（クリックでペイン選択、スクロールでログ確認）
set -g mouse on

# カラー設定（24bit color / True Color対応）
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# ステータスバーをトップに配置
set-option -g status-position top

# ==========================================
# キーバインド設定
# ==========================================
# 1. Prefix（合図）を Ctrl + s に変更
set -g prefix C-s
unbind C-b  # デフォルトの Ctrl + b を解除

# 2. 設定のリロード (Prefix + r)
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# 3. 画面分割 (h: 縦に割る / n: 横に割る)
bind h split-window -h
bind n split-window -v

# 4. ペイン移動 (i, j, k, l を十字キーに見立てる)
bind i select-pane -U  # 上
bind j select-pane -L  # 左
bind k select-pane -D  # 下
bind l select-pane -R  # 右

# ==========================================
# Catppuccin テーマ設定 (見た目のカスタマイズ)
# ==========================================
# プラグインは dotfiles に vendor 済み（tmux/plugins/catppuccin/）で、bootstrap が
# ~/.config/tmux/plugins/catppuccin へ symlink する（#29）。clone 一発で見た目まで揃う。
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# テーマ本体の読み込み（プラグイン不在でも素の tmux が正常起動するようガード＝#29）
if-shell "[ -f ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux ]" \
  "run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux"

# ステータスバー表示項目の設定
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"