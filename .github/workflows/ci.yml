name: ci

# clone 一発で全環境が揃うことを継続的に担保する（#20）。
# links.prop の src 欠落・plist 構文エラー・Brewfile 破損・シェル構文エラーを
# 手元の bootstrap 実行前に検知する。副作用なし（ln/sudo/launchctl/brew bundle は実行しない）。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # macOS: 本体の dry-run テスト（plutil/launchctl を使うため macos runner が必須）
  macos-dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: bootstrap dry-run test
        run: bash install/test_bootstrap_dry_run.sh
      - name: shell syntax check (bash)
        run: |
          bash -n install/bootstrap.sh
          for f in install/cli-tools/*.sh; do bash -n "$f"; done
      - name: shell syntax check (zsh functions & installers)
        run: |
          for f in zsh/functions/*; do zsh -n "$f" || exit 1; done
          for f in install/*.zsh; do zsh -n "$f" || exit 1; done
