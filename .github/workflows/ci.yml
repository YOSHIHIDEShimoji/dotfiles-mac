name: ci

# clone 一発で全環境が揃うことを継続的に担保する（#20）。
# links.prop の src 欠落・plist 構文エラー・Brewfile 破損・シェル構文エラーを
# 手元の bootstrap 実行前に検知する。副作用なし（ln/sudo/launchctl/brew bundle は実行しない）。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # macOS: 本体の dry-run テスト（plutil/launchctl を使うため macos runner が必須）
  macos-dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: bootstrap dry-run test
        run: bash install/test_bootstrap_dry_run.sh
      - name: shell syntax check (bash)
        run: |
          bash -n install/bootstrap.sh
          for f in install/cli-tools/*.sh; do bash -n "$f"; done
      - name: shell syntax check (zsh functions & installers)
        run: |
          for f in zsh/functions/*; do zsh -n "$f" || exit 1; done
          for f in install/*.zsh; do zsh -n "$f" || exit 1; done
      # shellcheck: 構文チェックでは拾えない論理バグ（未クオート変数・$* 連結・[ ] 誤り）を検出する（#51）。
      # まずは非ブロッキング（|| true）でレポートのみ。warning を潰してから将来 -S error で強制化する。
      - name: shellcheck (non-blocking / レポートのみ)
        run: |
          brew install shellcheck
          # bash/sh シバンを持つスクリプトだけを対象にする（Python CLI・vendored john は除外）
          files=()
          while IFS= read -r f; do
            head -1 "$f" | grep -qE '(bash|/bin/sh|env sh)' && files+=("$f")
          done < <(find install scripts -type f ! -name '*.py' ! -path '*/john/*' ! -path '*/wordlists/*')
          printf 'shellcheck target:\n'; printf '  %s\n' "${files[@]}"
          shellcheck -S warning "${files[@]}" || true
      # Brewfile の健全性: formula/cask 名のタイポや削除済みパッケージを検知する（#51）。
      # CI runner には未インストールなので check は差分を出すが、|| true で非ブロッキングにする。
      - name: Brewfile check (non-blocking)
        run: brew bundle check --file=install/Brewfile --verbose || true
